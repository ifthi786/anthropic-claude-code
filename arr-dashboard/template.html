<!DOCTYPE html>
<html lang="en" data-theme="dark" data-density="comfy" data-hovertip="on" style="--accent:#0f9b8e">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ARR Tracker — Strategic Sourcing Dashboard</title>
<style>
/* ============================================================
   THEME TOKENS
   ============================================================ */
:root{
  --accent:#2f6df0;
  --pos:#1f9d6b; --neg:#dc4848;
  --font:"Segoe UI",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  --mono:"SFMono-Regular",ui-monospace,"Cascadia Mono","Consolas",monospace;
}
/* SLATE (default light BI) */
:root[data-theme="slate"]{
  --bg:#eceef2; --canvas:#e7e9ee; --card:#ffffff; --card2:#f7f8fa;
  --ink:#1a1f29; --ink2:#5a6675; --ink3:#8a94a3;
  --line:#e2e5ea; --line2:#eef0f3; --track:#eceef2;
  --header:#ffffff; --shadow:0 1px 2px rgba(20,30,50,.06),0 1px 3px rgba(20,30,50,.05);
  --chipbg:#f1f3f6; --chiphover:#e7eaf0;
}
/* MONO (Aldar black/white) */
:root[data-theme="mono"]{
  --bg:#f3f2ee; --canvas:#edece7; --card:#ffffff; --card2:#f7f6f2;
  --ink:#141414; --ink2:#56544e; --ink3:#8b8880;
  --line:#e4e2da; --line2:#efede6; --track:#e9e7e0;
  --header:#141414; --shadow:0 1px 2px rgba(0,0,0,.05),0 1px 3px rgba(0,0,0,.05);
  --chipbg:#efedE6; --chiphover:#e6e3da;
}
/* DARK command center */
:root[data-theme="dark"]{
  --bg:#0d1016; --canvas:#0b0e13; --card:#161b24; --card2:#1c222d;
  --ink:#e8ecf3; --ink2:#9aa6b8; --ink3:#69748a;
  --line:#262e3b; --line2:#1f2632; --track:#222a36;
  --header:#11151d; --shadow:0 1px 2px rgba(0,0,0,.4),0 2px 8px rgba(0,0,0,.25);
  --chipbg:#1d2430; --chiphover:#27303e;
}

/* DENSITY */
:root[data-density="compact"]{ --gap:10px; --pad:14px; --fs-kpi:30px; --fs-base:12.5px; }
:root[data-density="regular"]{ --gap:14px; --pad:18px; --fs-kpi:34px; --fs-base:13.5px; }
:root[data-density="comfy"]{   --gap:20px; --pad:24px; --fs-kpi:40px; --fs-base:14.5px; }

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--canvas); color:var(--ink); font-family:var(--font);
  font-size:var(--fs-base); line-height:1.45; -webkit-font-smoothing:antialiased;
}
a{color:inherit;}
::selection{background:var(--accent);color:#fff;}

/* ============================================================
   HEADER
   ============================================================ */
.topbar{
  position:sticky; top:0; z-index:40; background:var(--header);
  border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:18px; padding:12px 24px;
}
:root[data-theme="dark"] .topbar{border-bottom-color:var(--line);}
.logo-chip{
  background:#fff; border-radius:9px; padding:9px 11px; display:flex; align-items:center;
  box-shadow:0 1px 2px rgba(0,0,0,.12); flex:none;
}
.logo-chip img{height:34px; width:auto; display:block;}
.title-wrap{display:flex; flex-direction:column; gap:1px; min-width:0;}
.title-wrap h1{
  margin:0; font-size:16px; font-weight:680; letter-spacing:-.2px;
}
.topbar h1{ color: var(--ink); }
:root[data-theme="mono"] .topbar h1,
:root[data-theme="mono"] .topbar .sub,
:root[data-theme="dark"] .topbar h1{ color:#fff; }
:root[data-theme="dark"] .topbar .sub{ color:#9aa6b8; }
.topbar .sub{font-size:12px; color:var(--ink2); font-weight:500;}
.topbar .spacer{flex:1;}
.meta{display:flex; flex-direction:column; align-items:flex-end; gap:2px; text-align:right;}
.meta .aed{
  font-size:11px; font-weight:700; letter-spacing:.6px; text-transform:uppercase;
  color:var(--accent); background:color-mix(in srgb,var(--accent) 12%,transparent);
  padding:3px 9px; border-radius:20px;
}
:root[data-theme="mono"] .meta .aed,
:root[data-theme="dark"] .meta .aed{color:var(--accent);}
.meta .upd{font-size:11px;}
:root[data-theme="mono"] .meta .upd,
:root[data-theme="dark"] .meta .upd{color:#9aa6b8;}
.topbar .meta .upd{color:var(--ink2);}

/* ============================================================
   FILTER BAR
   ============================================================ */
.filterbar{
  position:sticky; top:59px; z-index:30; background:var(--bg);
  border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:18px; padding:10px 24px; flex-wrap:wrap;
}
.fgroup{display:flex; align-items:center; gap:8px;}
.fgroup>.flabel{
  font-size:10.5px; font-weight:700; letter-spacing:.7px; text-transform:uppercase;
  color:var(--ink3); margin-right:2px;
}
.chips{display:flex; gap:6px; flex-wrap:wrap;}
.chip{
  font:inherit; font-size:12px; font-weight:560; cursor:pointer; user-select:none;
  border:1px solid var(--line); background:var(--chipbg); color:var(--ink2);
  padding:5px 11px; border-radius:7px; display:inline-flex; align-items:center; gap:6px;
  transition:.12s;
}
.chip:hover{background:var(--chiphover);}
.chip[aria-pressed="true"]{
  background:var(--accent); border-color:var(--accent); color:#fff;
}
.chip .dot{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.8;}
.fselect{
  font:inherit; font-size:12.5px; color:var(--ink); background:var(--card);
  border:1px solid var(--line); border-radius:7px; padding:5px 9px; cursor:pointer;
}
.fselect:focus{outline:2px solid color-mix(in srgb,var(--accent) 50%,transparent); outline-offset:0;}
/* multiselect dropdown */
.ms{position:relative;}
.ms-btn{
  font:inherit; font-size:12.5px; cursor:pointer; color:var(--ink); background:var(--card);
  border:1px solid var(--line); border-radius:7px; padding:5px 11px;
  display:inline-flex; align-items:center; gap:8px;
}
.ms-btn:hover{border-color:var(--ink3);}
.ms-btn .caret{font-size:9px; color:var(--ink3);}
.ms-pop{
  position:absolute; top:calc(100% + 6px); left:0; z-index:50; min-width:220px;
  background:var(--card); border:1px solid var(--line); border-radius:10px;
  box-shadow:0 8px 28px rgba(10,15,30,.18); padding:8px; display:none;
}
.ms.open .ms-pop{display:block;}
.ms-pop .ms-act{display:flex; justify-content:space-between; padding:4px 6px 8px; border-bottom:1px solid var(--line2); margin-bottom:6px;}
.ms-pop .ms-act button{font:inherit; font-size:11.5px; font-weight:600; color:var(--accent); background:none; border:none; cursor:pointer; padding:2px 4px;}
.ms-opt{display:flex; align-items:center; gap:9px; padding:6px 6px; border-radius:6px; cursor:pointer; font-size:12.5px;}
.ms-opt:hover{background:var(--card2);}
.ms-opt input{accent-color:var(--accent); width:15px; height:15px; cursor:pointer;}
.ms-opt .v{margin-left:auto; color:var(--ink3); font-variant-numeric:tabular-nums; font-size:11.5px;}
.btn-reset{
  font:inherit; font-size:12px; font-weight:600; cursor:pointer; color:var(--ink2);
  background:none; border:1px solid var(--line); border-radius:7px; padding:5px 11px;
}
.btn-reset:hover{color:var(--ink); border-color:var(--ink3);}

/* ============================================================
   LAYOUT GRID
   ============================================================ */
main{padding:var(--gap) 24px 48px;}
.grid{display:grid; grid-template-columns:repeat(12,1fr); gap:var(--gap); margin-bottom:var(--gap);}
.sec-head{
  display:flex; align-items:baseline; gap:10px; margin:calc(var(--gap) + 6px) 2px 4px;
}
.sec-head .t{font-size:12px; font-weight:740; letter-spacing:.6px; text-transform:uppercase; color:var(--ink2);}
.sec-head .d{font-size:11.5px; color:var(--ink3);}
.sec-head .rule{flex:1; height:1px; background:var(--line); align-self:center;}

.card{
  background:var(--card); border:1px solid var(--line); border-radius:11px;
  box-shadow:var(--shadow); padding:var(--pad); min-width:0;
}
.card.tight{padding:calc(var(--pad) - 4px) var(--pad);}
.card-h{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:12px;}
.card-h .ct{font-size:12.5px; font-weight:700; color:var(--ink);}
.card-h .cs{font-size:11px; color:var(--ink3); font-weight:500;}

.c2{grid-column:span 2;} .c3{grid-column:span 3;} .c4{grid-column:span 4;}
.c5{grid-column:span 5;} .c6{grid-column:span 6;} .c7{grid-column:span 7;}
.c8{grid-column:span 8;} .c12{grid-column:span 12;}

@media (max-width:1280px){
  .c7{grid-column:span 6;} .c5{grid-column:span 6;}
  .c8{grid-column:span 7;} .kpi.c2{grid-column:span 4;}
}
@media (max-width:1024px){
  .c4{grid-column:span 6;} .c7,.c5,.c8{grid-column:span 12;}
  .grid>.card.c4:last-child:nth-child(odd){grid-column:span 12;}
}
@media (max-width:720px){
  main,.topbar,.filterbar{padding-left:14px; padding-right:14px;}
  .c4,.kpi.c2{grid-column:span 12;}
  .gauge-wrap{flex-direction:column; align-items:flex-start;}
}

/* ============================================================
   KPI CARDS
   ============================================================ */
.kpi{position:relative; overflow:hidden;}
.kpi .klabel{font-size:11px; font-weight:650; letter-spacing:.3px; color:var(--ink2); text-transform:uppercase;}
.kpi .kval{font-size:var(--fs-kpi); font-weight:730; letter-spacing:-1px; line-height:1.05; margin-top:8px; font-variant-numeric:tabular-nums; cursor:default;}
.kpi .ksub{font-size:11.5px; color:var(--ink3); margin-top:6px; display:flex; align-items:center; gap:6px;}
.kpi .accent-bar{position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent);}
.kpi .kunit{font-size:.55em; font-weight:600; color:var(--ink3); margin-left:3px; letter-spacing:0;}
.pill{font-size:11px; font-weight:700; padding:2px 7px; border-radius:20px; font-variant-numeric:tabular-nums;}
.pill.pos{color:var(--pos); background:color-mix(in srgb,var(--pos) 14%,transparent);}
.pill.neg{color:var(--neg); background:color-mix(in srgb,var(--neg) 14%,transparent);}
.pill.mut{color:var(--ink2); background:var(--card2);}

/* ============================================================
   GAUGE
   ============================================================ */
.gauge-wrap{display:flex; align-items:center; gap:var(--pad);}
.gauge{flex:none; position:relative; width:168px; height:168px;}
.gauge svg{transform:rotate(-90deg);}
.gauge .center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.gauge .center .big{font-size:34px; font-weight:760; letter-spacing:-1px; line-height:1; font-variant-numeric:tabular-nums;}
.gauge .center .cap{font-size:10.5px; color:var(--ink3); text-transform:uppercase; letter-spacing:.5px; margin-top:5px;}
.gauge-legend{display:flex; flex-direction:column; gap:12px; flex:1; min-width:0;}
.gl-row{display:flex; flex-direction:column; gap:3px;}
.gl-row .gl-top{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--ink2);}
.gl-row .gl-top .sw{width:10px; height:10px; border-radius:3px;}
.gl-row .gl-val{font-size:18px; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:-.3px;}

/* ============================================================
   HORIZONTAL BARS (location / staff)
   ============================================================ */
.bars{display:flex; flex-direction:column; gap:13px;}
.bar-row .br-top{display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin-bottom:5px;}
.bar-row .br-name{font-size:12.5px; font-weight:600;}
.bar-row .br-name .rank{display:inline-block; width:18px; color:var(--ink3); font-weight:600; font-variant-numeric:tabular-nums;}
.bar-row .br-val{font-size:12.5px; font-weight:700; font-variant-numeric:tabular-nums; cursor:default;}
.bar-row .br-meta{font-size:11px; color:var(--ink3); font-weight:500;}
.track{position:relative; height:9px; background:var(--track); border-radius:6px; overflow:hidden;}
.track .fill{position:absolute; left:0; top:0; bottom:0; border-radius:6px; background:var(--accent); transition:width .5s cubic-bezier(.22,1,.36,1);}
.track.budget .fill-bg{position:absolute; left:0; top:0; bottom:0; border-radius:6px; background:color-mix(in srgb,var(--accent) 22%,transparent);}
.legend-inline{display:flex; gap:16px; margin-bottom:14px;}
.legend-inline .li{display:flex; align-items:center; gap:6px; font-size:11px; color:var(--ink2);}
.legend-inline .li .sw{width:11px; height:11px; border-radius:3px;}

/* status progress */
.status-list{display:flex; flex-direction:column; gap:16px;}
.st-row .st-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
.st-row .st-name{font-size:13px; font-weight:650;}
.st-row .st-name .badge{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; padding:2px 7px; border-radius:5px; margin-left:8px;}
.badge.aw{color:var(--accent); background:color-mix(in srgb,var(--accent) 13%,transparent);}
.badge.on{color:var(--ink2); background:var(--card2);}
.st-row .st-num{font-size:12.5px; font-variant-numeric:tabular-nums; color:var(--ink2);}
.st-row .st-num b{color:var(--ink); font-weight:700;}

/* ============================================================
   TABLES
   ============================================================ */
.tbl{width:100%; border-collapse:collapse; font-size:12.5px;}
.tbl th{
  text-align:right; font-size:10.5px; font-weight:700; letter-spacing:.4px; text-transform:uppercase;
  color:var(--ink3); padding:0 0 9px; border-bottom:1px solid var(--line); white-space:nowrap;
}
.tbl th:first-child, .tbl td:first-child{text-align:left;}
.tbl td{padding:9px 0; border-bottom:1px solid var(--line2); font-variant-numeric:tabular-nums; white-space:nowrap;}
.tbl tr:last-child td{border-bottom:none;}
.tbl td:not(:first-child){text-align:right;}
.tbl tr.total td{font-weight:740; border-top:1.5px solid var(--line); border-bottom:none; padding-top:11px; color:var(--ink);}
.tbl .nm{font-weight:600;}
.tbl td .v{cursor:default;}
.num-pos{color:var(--pos);} .num-neg{color:var(--neg);}
.tbl-scroll{overflow-x:auto;}

/* ============================================================
   MONTHLY TREND
   ============================================================ */
.trend-wrap{position:relative;}
.trend-svg{width:100%; height:auto; display:block; overflow:visible;}
.trend-grid line{stroke:var(--line); stroke-width:1;}
.trend-area{fill:url(#areaGrad);}
.trend-line{fill:none; stroke:var(--accent); stroke-width:2.5; stroke-linejoin:round; stroke-linecap:round;}
.trend-dot{fill:var(--card); stroke:var(--accent); stroke-width:2.5;}
.trend-xlab{fill:var(--ink3); font-size:11px; text-anchor:middle;}
.trend-ylab{fill:var(--ink3); font-size:10.5px; text-anchor:end;}
.trend-vlab{fill:var(--ink); font-size:11px; font-weight:700; text-anchor:middle;}

.empty{color:var(--ink3); font-size:12.5px; padding:18px 2px; text-align:center;}

/* ============================================================
   STARTUP ANIMATIONS
   Entrances are layered on via the Web Animations API in JS.
   Every element's RESTING style below is the final visible state,
   so if animations are disabled/frozen (print, reduced-motion,
   capture tools) the dashboard still renders fully.
   ============================================================ */
.track .fill, .track .fill-bg{ transition:width .6s cubic-bezier(.22,1,.36,1); }
.gauge .val-ring{ transition:stroke-dashoffset .7s cubic-bezier(.22,1,.36,1); }

/* ============================================================
   HOVER INFO TOOLTIP
   ============================================================ */
:root[data-hovertip="on"] .has-tip{ cursor:help; }
:root[data-hovertip="on"] .has-tip.bar-row,
:root[data-hovertip="on"] .has-tip.st-row{ border-radius:8px; transition:background .14s ease; }
:root[data-hovertip="on"] .has-tip.bar-row:hover,
:root[data-hovertip="on"] .has-tip.st-row:hover{ background:var(--card2); }
:root[data-hovertip="on"] .kpi.has-tip{ transition:transform .16s ease, border-color .16s ease; }
:root[data-hovertip="on"] .kpi.has-tip:hover{ transform:translateY(-3px); border-color:var(--accent); }
.trend-dot.has-tip{ transition:r .12s ease; }
#tip{
  position:fixed; z-index:300; pointer-events:none; max-width:286px; min-width:170px;
  background:var(--card); color:var(--ink); border:1px solid var(--line);
  border-radius:12px; box-shadow:0 14px 38px rgba(5,10,25,.34); padding:12px 14px;
  font-family:var(--font); font-size:12.5px; opacity:0; transform:translateY(5px) scale(.98);
  transition:opacity .12s ease, transform .12s ease; left:0; top:0;
}
#tip.show{ opacity:1; transform:none; }
#tip .tip-eye{ font-size:9.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--ink3); margin-bottom:3px; }
#tip .tip-h{ font-weight:700; font-size:13px; margin-bottom:9px; display:flex; align-items:center; gap:8px; letter-spacing:-.1px; }
#tip .tip-h .sw{ width:10px; height:10px; border-radius:3px; flex:none; }
#tip .tip-row{ display:flex; justify-content:space-between; align-items:baseline; gap:20px; padding:3px 0; }
#tip .tip-row .l{ color:var(--ink2); }
#tip .tip-row .r{ font-weight:660; font-variant-numeric:tabular-nums; white-space:nowrap; }
#tip .tip-row .r.neg{ color:var(--neg); } #tip .tip-row .r.pos{ color:var(--pos); }
#tip .tip-note{ margin-top:9px; font-size:11px; line-height:1.5; color:var(--ink3); border-top:1px solid var(--line2); padding-top:8px; }

/* ============================================================
   TWEAKS PANEL
   ============================================================ */
#tweaks-panel{
  position:fixed; right:18px; bottom:18px; z-index:200; width:268px;
  background:var(--card); color:var(--ink); border:1px solid var(--line);
  border-radius:14px; box-shadow:0 18px 50px rgba(10,15,30,.28);
  font-family:var(--font); display:none; overflow:hidden;
}
#tweaks-panel.show{display:block;}
.tw-head{display:flex; align-items:center; justify-content:space-between; padding:13px 15px; border-bottom:1px solid var(--line2);}
.tw-head .tt{font-size:13px; font-weight:700;}
.tw-head .x{cursor:pointer; border:none; background:none; color:var(--ink3); font-size:18px; line-height:1; padding:2px 4px;}
.tw-body{padding:6px 15px 15px; max-height:70vh; overflow:auto;}
.tw-sec{font-size:10.5px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--ink3); margin:15px 0 8px;}
.tw-row{margin-bottom:4px;}
.tw-row .rl{font-size:12px; color:var(--ink2); margin-bottom:6px;}
.seg{display:flex; gap:4px; background:var(--card2); border:1px solid var(--line); border-radius:8px; padding:3px;}
.seg button{flex:1; font:inherit; font-size:11.5px; font-weight:600; cursor:pointer; border:none; background:none; color:var(--ink2); padding:6px 4px; border-radius:5px; transition:.1s;}
.seg button[aria-pressed="true"]{background:var(--accent); color:#fff;}
.swatches{display:flex; gap:8px;}
.swatches button{width:30px; height:30px; border-radius:8px; border:2px solid transparent; cursor:pointer; padding:0;}
.swatches button[aria-pressed="true"]{border-color:var(--ink); box-shadow:0 0 0 2px var(--card),0 0 0 4px var(--ink2);}
</style>
</head>
<body>

<template id="__bundler_thumbnail" data-bg-color="#0b0e13">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect x="180" y="470" width="120" height="230" rx="10" fill="#0f9b8e"/>
    <rect x="340" y="380" width="120" height="320" rx="10" fill="#0f9b8e"/>
    <rect x="500" y="250" width="120" height="450" rx="10" fill="#14c2b0"/>
    <rect x="660" y="340" width="120" height="360" rx="10" fill="#0f9b8e"/>
    <rect x="820" y="200" width="120" height="500" rx="10" fill="#14c2b0"/>
    <circle cx="600" cy="150" r="46" fill="none" stroke="#0f9b8e" stroke-width="16"
            stroke-dasharray="216 72" stroke-linecap="round" transform="rotate(-90 600 150)"/>
  </svg>

  /* ============================================================
     SCOPED AGGREGATES (honest decomposition of window.ARR)
     ============================================================ */
  function scope() {
    var locF = D.LOCATIONS.filter(function (l) { return S.loc.has(l.key); });
    var statF = D.STATUS.filter(function (s) { return S.stat.has(s.key); });
    var staffF = D.STAFF.filter(function (s) { return S.buyer.has(s.name); });
    var monthsF = D.MONTHS.slice(S.mFrom, S.mTo + 1);

    var awardedIncl = S.stat.has("awarded");
    var ongoingIncl = S.stat.has("ongoing");
    var locBudget = sum(locF, function (l) { return l.budget; });
    var locAwarded = sum(locF, function (l) { return l.awarded; });
    var locSaving = sum(locF, function (l) { return l.saving; });
    var ongoingStat = D.STATUS.filter(function (s) { return s.key === "ongoing"; })[0];
    var ongoingBudget = ongoingStat ? ongoingStat.budget : 0;

    var awardBudget = awardedIncl ? locBudget : 0;
    var awardedVal = awardedIncl ? locAwarded : 0;
    var saving = awardedIncl ? locSaving : 0;
    var programBudget = awardBudget + (ongoingIncl ? ongoingBudget : 0);
    var savingPct = awardBudget ? saving / awardBudget : 0;
    var coverage = programBudget ? awardedVal / programBudget : 0;
    var packages = (S.buyer.size === D.STAFF.length)
      ? D.TOTALS.packages : sum(staffF, function (s) { return s.packages; });

    return {
      locF: locF, statF: statF, staffF: staffF, monthsF: monthsF,
      awardBudget: awardBudget, awardedVal: awardedVal, saving: saving,
      programBudget: programBudget, savingPct: savingPct, coverage: coverage,
      packages: packages, ongoingBudget: ongoingIncl ? ongoingBudget : 0,
      remaining: Math.max(0, programBudget - awardedVal)
    };
  }

  /* ============================================================
     GAUGE
     ============================================================ */
  function gauge(pct) {
    var size = 168, sw = 16, r = (size - sw) / 2, cx = size / 2, c = 2 * Math.PI * r;
    var p = Math.max(0, Math.min(1, pct));
    var ns = "http://www.w3.org/2000/svg";
    var svg = document.createElementNS(ns, "svg");
    svg.setAttribute("width", size); svg.setAttribute("height", size);
    function ring(stroke, dash, dashG) {
      var c2 = document.createElementNS(ns, "circle");
      c2.setAttribute("cx", cx); c2.setAttribute("cy", cx); c2.setAttribute("r", r);
      c2.setAttribute("fill", "none"); c2.setAttribute("stroke", stroke);
      c2.setAttribute("stroke-width", sw); c2.setAttribute("stroke-linecap", "round");
      if (dash != null) { c2.setAttribute("stroke-dasharray", dash + " " + dashG); }
      return c2;
    }
    svg.appendChild(ring("var(--track)"));
    var valRing = ring("var(--accent)");
    valRing.setAttribute("class", "val-ring");
    valRing.setAttribute("stroke-dasharray", c);
    valRing.setAttribute("stroke-dashoffset", c * (1 - p)); // resting state = filled
    svg.appendChild(valRing);
    waapi(valRing, [{ strokeDashoffset: c }, { strokeDashoffset: c * (1 - p) }], 1100, 120);
    var bigNode = el("div", { class: "big" }, F.pct(p, p < 0.1 ? 1 : 0));
    if (ANIM) countUp(bigNode, p, function (v) { return F.pct(v, p < 0.1 ? 1 : 0); }, 1100);
    var wrap = el("div", { class: "gauge" }, [svg,
      el("div", { class: "center" }, [
        bigNode,
        el("div", { class: "cap" }, "Awarded")
      ])]);
    return wrap;
  }

      tipify(row, { eyebrow: "Buyer · rank #" + (i + 1), title: s.name, sw: "var(--accent)", rows: [
        { l: "Awarded value", r: F.full(s.awarded) },
        { l: "Packages", r: String(s.packages) },
        { l: "Avg / package", r: s.packages ? F.full(avg) : "—" },
        { l: "Savings", r: F.full(s.saving), cls: signCls(s.saving) },
        { l: "Savings rate", r: F.pct(rate, 1), cls: signCls(s.saving) }
      ] });
      return row;
    }) : [el("div", { class: "empty" }, "No buyers selected")];
    g.appendChild(el("div", { class: "card c7" }, [
      el("div", { class: "card-h" }, [el("span", { class: "ct" }, "Awarded Value by Buyer"),
        el("span", { class: "cs" }, "leaderboard")]),
      el("div", { class: "bars" }, bars)
    ]));

    var tot = { p: sum(sorted, function (s) { return s.packages; }), a: sum(sorted, function (s) { return s.awarded; }), sv: sum(sorted, function (s) { return s.saving; }) };
    var body = sorted.map(function (s) {
      var rate = s.awarded ? s.saving / s.awarded : 0;
      return el("tr", {}, [
        el("td", { class: "nm" }, s.name),
        el("td", {}, String(s.packages)),
        el("td", {}, money(s.awarded)),
        el("td", {}, money(s.saving, { sign: true })),
        el("td", {}, F.pct(rate, 1))
      ]);
    });
    body.push(el("tr", { class: "total" }, [
      el("td", {}, "Total"), el("td", {}, String(tot.p)), el("td", {}, money(tot.a)),
      el("td", {}, money(tot.sv, { sign: true })), el("td", {}, F.pct(tot.a ? tot.sv / tot.a : 0, 1))
    ]));
    g.appendChild(el("div", { class: "card c5" }, [
      el("div", { class: "card-h" }, [el("span", { class: "ct" }, "Detail")]),
      el("div", { class: "tbl-scroll" }, table(["Buyer", "Pkgs", "Awarded", "Savings", "% Sav"], body))
    ]));
    host.appendChild(g);
  }

  /* ============================================================
     MONTHLY TREND
     ============================================================ */
  function niceMax(m) {
    if (m <= 0) return 1;
    var e = Math.pow(10, Math.floor(Math.log10(m))), f = m / e, n;
    if (f <= 1) n = 1; else if (f <= 2) n = 2; else if (f <= 2.5) n = 2.5; else if (f <= 5) n = 5; else n = 10;
    return n * e;
  }
  function trendChart(months, animate) {
    var ns = "http://www.w3.org/2000/svg";
    var W = 1000, H = 340, padL = 64, padR = 18, padT = 26, padB = 38;
    var pw = W - padL - padR, ph = H - padT - padB;
    var vals = months.map(function (m) { return m.awarded; });
    var ymax = niceMax(Math.max.apply(null, vals.concat([1])));
    var n = months.length;
    var xAt = function (i) { return n <= 1 ? padL + pw / 2 : padL + pw * i / (n - 1); };
    var yAt = function (v) { return padT + ph * (1 - v / ymax); };

    var svg = document.createElementNS(ns, "svg");
    svg.setAttribute("viewBox", "0 0 " + W + " " + H);
    svg.setAttribute("class", "trend-svg");
    var defs = document.createElementNS(ns, "defs");
    defs.innerHTML = '<linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="var(--accent)" stop-opacity="0.28"/>' +
      '<stop offset="100%" stop-color="var(--accent)" stop-opacity="0.02"/></linearGradient>';
    svg.appendChild(defs);

    // gridlines + y labels
    var g = document.createElementNS(ns, "g"); g.setAttribute("class", "trend-grid");
    for (var t = 0; t <= 4; t++) {
      var yv = ymax * t / 4, y = yAt(yv);
      var ln = document.createElementNS(ns, "line");
      ln.setAttribute("x1", padL); ln.setAttribute("x2", W - padR);
      ln.setAttribute("y1", y); ln.setAttribute("y2", y);
      g.appendChild(ln);
      var tx = document.createElementNS(ns, "text");
      tx.setAttribute("class", "trend-ylab"); tx.setAttribute("x", padL - 10); tx.setAttribute("y", y + 4);
      tx.textContent = F.compact(yv);
      g.appendChild(tx);
    }
    svg.appendChild(g);

    // area + line
    var dLine = "", dArea = "";
    months.forEach(function (m, i) {
      var x = xAt(i), y = yAt(m.awarded);
      dLine += (i === 0 ? "M" : "L") + x + " " + y + " ";
    });
    if (n === 1) { dLine = "M" + (padL) + " " + yAt(months[0].awarded) + " L" + (W - padR) + " " + yAt(months[0].awarded); }
    dArea = dLine + "L" + xAt(n - 1) + " " + yAt(0) + " L" + xAt(0) + " " + yAt(0) + " Z";
    var area = document.createElementNS(ns, "path"); area.setAttribute("class", "trend-area"); area.setAttribute("d", dArea);
    var line = document.createElementNS(ns, "path"); line.setAttribute("class", "trend-line"); line.setAttribute("d", dLine);
    svg.appendChild(area); svg.appendChild(line);

    // dots + labels + x labels
    var showVals = n <= 9;
    var grand = months.reduce(function (a, m) { return a + m.awarded; }, 0);
    months.forEach(function (m, i) {
      var x = xAt(i), y = yAt(m.awarded);
      var dot = document.createElementNS(ns, "circle");
      dot.setAttribute("class", "trend-dot"); dot.setAttribute("cx", x); dot.setAttribute("cy", y); dot.setAttribute("r", 4.5);
      svg.appendChild(dot);
      if (showVals && m.awarded > 0) {
        var v = document.createElementNS(ns, "text");
        v.setAttribute("class", "trend-vlab");
        var vx = x, anchor = "middle";
        if (i === 0 && n > 1) { vx = x + 7; anchor = "start"; }
        else if (i === n - 1 && n > 1) { vx = x - 7; anchor = "end"; }
        v.setAttribute("text-anchor", anchor);
        v.setAttribute("x", vx); v.setAttribute("y", y - 12);
        v.textContent = F.compact(m.awarded);
        svg.appendChild(v);
      }
      var xl = document.createElementNS(ns, "text");
      xl.setAttribute("class", "trend-xlab"); xl.setAttribute("x", x); xl.setAttribute("y", H - 12);
      xl.textContent = m.short;
      svg.appendChild(xl);

      // enlarged transparent hit target carrying the hover tooltip
      var hit = document.createElementNS(ns, "circle");
      hit.setAttribute("cx", x); hit.setAttribute("cy", y); hit.setAttribute("r", 13);
      hit.setAttribute("fill", "transparent");
      tipify(hit, { eyebrow: "Period", title: m.label, sw: "var(--accent)", rows: [
        { l: "Awarded", r: F.full(m.awarded) },
        { l: "% of total", r: grand ? F.pct(m.awarded / grand, 1) : "—" }
      ] });
      svg.appendChild(hit);
    });

    if (animate && canAnim()) {
      requestAnimationFrame(function () {
        var len = line.getTotalLength ? line.getTotalLength() : pw;
        try {
          // line draws in; resting base has no dash, so it stays fully drawn after
          line.animate(
            [{ strokeDasharray: len + " " + len, strokeDashoffset: len },
             { strokeDasharray: len + " " + len, strokeDashoffset: 0 }],
            { duration: 1250, easing: "cubic-bezier(.4,.7,.3,1)", fill: "backwards" }
          );
        } catch (e) {}
        waapi(area, [{ opacity: 0 }, { opacity: 1 }], 900, 300);
        svg.querySelectorAll(".trend-dot, .trend-vlab").forEach(function (d, i) {
          waapi(d, [{ opacity: 0 }, { opacity: 1 }], 380, 320 + i * 55);
        });
      });
    }
    return svg;
  }

  function renderMonths(sc, host) {
    host.appendChild(secHead("Month-wise awarded", sc.monthsF.length + " period" + (sc.monthsF.length === 1 ? "" : "s")));
    var g = el("div", { class: "grid" });
    var totalAwd = sum(sc.monthsF, function (m) { return m.awarded; });

    g.appendChild(el("div", { class: "card c8" }, [
      el("div", { class: "card-h" }, [el("span", { class: "ct" }, "Awarded Value Trend"),
        el("span", { class: "cs" }, "monthly, AED")]),
      sc.monthsF.length ? el("div", { class: "trend-wrap" }, trendChart(sc.monthsF, ANIM))
        : el("div", { class: "empty" }, "No periods in range")
    ]));

    var body = sc.monthsF.map(function (m) {
      return el("tr", {}, [
        el("td", { class: "nm" }, m.label),
        el("td", {}, money(m.awarded)),
        el("td", {}, F.pct(totalAwd ? m.awarded / totalAwd : 0, 1))
      ]);
    });
    body.push(el("tr", { class: "total" }, [el("td", {}, "Total"), el("td", {}, money(totalAwd)), el("td", {}, "100%")]));
    g.appendChild(el("div", { class: "card c4" }, [
      el("div", { class: "card-h" }, [el("span", { class: "ct" }, "Detail")]),
      el("div", { class: "tbl-scroll" }, table(["Period", "Awarded", "% of total"], body))
    ]));
    host.appendChild(g);
  }

  /* ============================================================
     RENDER ALL
     ============================================================ */
  function renderAll() {
    renderFilters();
    var sc = scope();
    var dash = document.getElementById("dash");
    dash.innerHTML = "";
    dash.appendChild(secHead("Executive summary", "scoped by Location & Status filters"));
    renderKPIs(sc, dash);
    renderOverview(sc, dash);
    renderLocations(sc, dash);
    renderStaff(sc, dash);
    renderMonths(sc, dash);

    // entrance: fade/slide cards + section heads up, first load only
    if (ANIM && canAnim()) {
      var blocks = dash.querySelectorAll(".sec-head, .card");
      blocks.forEach(function (b, i) {
        waapi(b, [{ opacity: 0, transform: "translateY(16px)" }, { opacity: 1, transform: "none" }],
          560, Math.min(i * 42, 700));
      });
      // failsafe: guarantee the final visible state even if the animation
      // engine is paused/disabled (capture tools, odd environments)
      setTimeout(function () {
        blocks.forEach(function (b) { b.style.opacity = "1"; b.style.transform = "none"; });
      }, 1500);
    }
    animateBars(dash); // bars grow from 0 on every render
    ANIM = false;      // subsequent re-renders (filters/tweaks) stay snappy
  }

  /* ============================================================
     TWEAK PANEL (vanilla)
     ============================================================ */
  var panelOpen = false;
  function seg(label, value, opts, onCh) {
    var row = el("div", { class: "tw-row" }, [el("div", { class: "rl" }, label)]);
    var s = el("div", { class: "seg" });
    opts.forEach(function (o) {
      s.appendChild(el("button", {
        "aria-pressed": value === o.v ? "true" : "false",
        onclick: function () { onCh(o.v); }
      }, o.l));
    });
    row.appendChild(s); return row;
  }
  function buildTweakPanel() {
    var p = document.getElementById("tweaks-panel");
    if (!p) {
      p = el("div", { id: "tweaks-panel" }); document.body.appendChild(p);
    }
    p.className = panelOpen ? "show" : "";
    p.innerHTML = "";
    p.appendChild(el("div", { class: "tw-head" }, [
      el("span", { class: "tt" }, "Tweaks"),
      el("button", { class: "x", onclick: dismiss }, "\u00D7")
    ]));
    var body = el("div", { class: "tw-body" });
    body.appendChild(el("div", { class: "tw-sec" }, "Direction"));
    body.appendChild(seg("Visual theme", TW.direction,
      [{ v: "slate", l: "Slate" }, { v: "mono", l: "Mono" }, { v: "dark", l: "Dark" }],
      function (v) { setTweak("direction", v); }));
    body.appendChild(el("div", { class: "tw-sec" }, "Accent"));
    var sw = el("div", { class: "swatches" });
    [["#2f6df0", "Blue"], ["#0f9b8e", "Teal"], ["#6149e0", "Indigo"], ["#b9892f", "Gold"], ["#1f2937", "Ink"]]
      .forEach(function (c) {
        sw.appendChild(el("button", {
          style: "background:" + c[0], title: c[1], "aria-pressed": TW.accent === c[0] ? "true" : "false",
          onclick: function () { setTweak("accent", c[0]); }
        }));
      });
    body.appendChild(el("div", { class: "tw-row" }, sw));
    body.appendChild(el("div", { class: "tw-sec" }, "Layout"));
    body.appendChild(seg("Density", TW.density,
      [{ v: "compact", l: "Compact" }, { v: "regular", l: "Regular" }, { v: "comfy", l: "Comfy" }],
      function (v) { setTweak("density", v); }));
    body.appendChild(el("div", { class: "tw-sec" }, "Numbers"));
    body.appendChild(seg("Table figures", TW.numberFormat,
      [{ v: "compact", l: "Compact" }, { v: "full", l: "Full AED" }],
      function (v) { setTweak("numberFormat", v); }));
    body.appendChild(el("div", { class: "tw-sec" }, "Interaction"));
    body.appendChild(seg("Hover info tooltips", TW.hoverInfo,
      [{ v: true, l: "On" }, { v: false, l: "Off" }],
      function (v) { setTweak("hoverInfo", v); }));
    p.appendChild(body);
  }
  function dismiss() { panelOpen = false; buildTweakPanel(); window.parent.postMessage({ type: "__edit_mode_dismissed" }, "*"); }
  window.addEventListener("message", function (e) {
    var t = e && e.data && e.data.type;
    if (t === "__activate_edit_mode") { panelOpen = true; buildTweakPanel(); }
    else if (t === "__deactivate_edit_mode") { panelOpen = false; buildTweakPanel(); }
  });

  /* ============================================================
     INIT
     ============================================================ */
  applyTweaks();
  attachTipEngine();
  S = freshState();
  renderAll();
  buildTweakPanel();
  window.parent.postMessage({ type: "__edit_mode_available" }, "*");
})();

</script>
</body>
</html>
